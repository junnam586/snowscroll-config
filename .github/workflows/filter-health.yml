name: filter-health

# Proactive selector-health monitor. Loads the live mobile web your app filters, checks the
# config's plain-CSS anchor selectors, and if one matches 0 elements (DOM changed -> feed
# probably leaking) it opens/updates a GitHub issue, optionally pings a webhook, and fails the
# run so you ALSO get GitHub's workflow-failure email.

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min (GitHub throttles tighter schedules; best-effort timing)
  workflow_dispatch: {}      # run it manually any time from the Actions tab

permissions:
  issues: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright + Chromium
        working-directory: monitor
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run filter-health check
        id: run
        working-directory: monitor
        continue-on-error: true   # capture the result; we decide what to do below
        env:
          # Optional - set these as repo Secrets to enable the Instagram (logged-in) checks.
          # USE A BURNER ACCOUNT. CI logins are frequently checkpointed; if so, IG checks skip.
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
        run: |
          set +e
          node check.mjs | tee out.txt
          echo "code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          echo "summary=$(grep '::summary::' out.txt | sed 's/.*::summary:://')" >> "$GITHUB_OUTPUT"

      - name: Heartbeat ping (dead-man's-switch)
        # Ping healthchecks.io on every run that actually EXECUTED (filters OK *or* broken - the
        # monitor is alive either way; filter breakage is alerted separately by the issue below).
        # If these pings ever STOP (workflow disabled, cron not firing, install crash), healthchecks.io
        # alerts YOU that the watchman fell asleep. That's the "is the monitor itself alive?" cover.
        if: steps.run.outputs.code == '0' || steps.run.outputs.code == '1'
        env:
          HC_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          if [ -n "$HC_URL" ]; then
            curl -fsS -m 10 --retry 3 "$HC_URL" >/dev/null && echo "heartbeat sent" || echo "heartbeat ping failed (non-fatal)"
          else
            echo "No HEALTHCHECK_URL secret set; dead-man's-switch disabled."
          fi

      - name: Open/update an issue on breakage
        if: steps.run.outputs.code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = `${{ steps.run.outputs.summary }}`;
            const log = fs.readFileSync('monitor/out.txt', 'utf8').slice(-5000);
            const title = '🔴 Filter health: an anchor selector broke';
            const body = [
              `**${summary}**`, '',
              'A config selector matched **0** elements on the live mobile web — the DOM likely changed and a feed may be leaking.',
              '',
              '**Fix:** validate on a device → patch the selector in `filters/v1.json` → bump `configVersion` (`scripts/bump-config-version.py`) → push. Users adopt it on next launch.',
              '',
              `<details><summary>run log</summary>\n\n\`\`\`\n${log}\n\`\`\`\n</details>`,
              '',
              `_[run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})_`,
            ].join('\n');
            const { owner, repo } = context.repo;
            const open = (await github.rest.issues.listForRepo({ owner, repo, state: 'open', per_page: 100 })).data;
            const existing = open.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner, repo, title, body });
            }

      - name: Optional webhook ping (Slack or Discord)
        if: steps.run.outputs.code != '0'
        env:
          WEBHOOK: ${{ secrets.ALERT_WEBHOOK }}
        run: |
          if [ -n "$WEBHOOK" ]; then
            curl -s -X POST -H 'Content-Type: application/json' \
              -d "{\"text\":\"🔴 snowscroll filter health: ${{ steps.run.outputs.summary }}\",\"content\":\"🔴 snowscroll filter health: ${{ steps.run.outputs.summary }}\"}" \
              "$WEBHOOK" >/dev/null || true
          else
            echo "No ALERT_WEBHOOK secret set; relying on the issue + workflow-failure email."
          fi

      - name: Fail the run if broken
        if: steps.run.outputs.code != '0'
        run: |
          echo "Filter health check found broken anchors. See the issue above."
          exit 1
